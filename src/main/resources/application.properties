spring.application.name=Myspring_homework

# 사용자 정의 환경 변수
myprop.username=springboot
myprop.port=${random.int(1,100)}

# 현재 활성화된 Profile 값 설정 test|prod
spring.profiles.active=test

# schema file 경로 설정
spring.flyway.location=classpath:/db/migration/{vendor}
# 기존 DB가 있어도 Flyway가 인식하고 버전 관리 시작
spring.flyway.baselineOnMigrate=true
# flyway로 형상 관리 (애플리케이션 시작시 DB 버전 체크)
spring.flyway.enabled=true